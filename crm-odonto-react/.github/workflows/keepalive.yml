name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 * * *'  # Todo dia às 8h UTC (5h Brasília)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Aviso: Supabase retornou status $STATUS"
          else
            echo "Supabase ativo!"
          fi
